name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        # @rekurt/openkline-core is vendored as a tarball in vendor/ until it
        # is published to npm — refresh it with `npm run update:core`.
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build library
        run: npm run build

      - name: Typecheck
        # The example imports `@rekurt/openkline-vue` which resolves to
        # `dist/index.d.ts`, so typecheck must run AFTER the build step.
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

      - name: Build example (smoke)
        run: npm run build:example
